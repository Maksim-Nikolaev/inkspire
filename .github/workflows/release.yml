name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: inkspire-linux
          - os: windows-latest
            artifact: inkspire-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install opencv-python numpy Pillow fonttools pyinstaller

      - name: Build executable
        run: pyinstaller inkspire.spec

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/inkspire dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/inkspire.exe dist/${{ matrix.artifact }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/inkspire-linux/inkspire-linux
            artifacts/inkspire-windows/inkspire-windows.exe
          generate_release_notes: true
