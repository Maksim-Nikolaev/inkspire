name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install opencv-python numpy Pillow fonttools pyinstaller

      - name: Build executable
        run: pyinstaller inkspire.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/inkspire
          tar -czf dist/inkspire.tar.gz -C dist inkspire

      - uses: actions/upload-artifact@v4
        with:
          name: inkspire-${{ matrix.name }}
          path: |
            dist/inkspire.tar.gz
            dist/inkspire.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/inkspire-linux/inkspire.tar.gz
            artifacts/inkspire-windows/inkspire.exe
          generate_release_notes: true
